<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro-Dash | Portfolio & OS</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js" defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        :root {
            --bg:#ffffff; --s1:#f8f8f8; --s2:#f0f0f0;
            --b:#e0e0e0; --bd:#b0b0b0;
            --t:#111111; --td:#666666; --tf:#aaaaaa;
            --r:3px; --sw:64px;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:var(--bg); color:var(--t); font-family:'Inter',sans-serif; font-size:14px; min-height:100vh; overflow-x:hidden; display: flex; }

        /* SIDEBAR */
        .sidebar { position:fixed; left:0; top:0; bottom:0; width:var(--sw); background:var(--bg); border-right:1px solid var(--b); display:flex; flex-direction:column; align-items:center; padding:20px 0; z-index:200; gap:8px; }
        .logo { font-family:'Playfair Display',serif; font-size:20px; font-weight:700; color:var(--t); margin-bottom:24px; }
        .nb { width:40px; height:40px; border-radius:var(--r); border:none; background:transparent; color:var(--tf); cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:16px; transition:all .2s; }
        .nb:hover { background:var(--s2); color:var(--t); }
        .nb.on { background:var(--t); color:#fff; }

        /* MAIN CONTENT */
        .main { margin-left:var(--sw); flex:1; min-height:100vh; position: relative; }
        .page { display:none; padding:60px; animation: fadeIn 0.3s ease; }
        .page.on { display:block; }
        @keyframes fadeIn { from { opacity:0; transform: translateY(10px); } to { opacity:1; transform: translateY(0); } }

        /* TYPOGRAPHY & BUTTONS */
        .ey { font-family:'JetBrains Mono', monospace; font-size:10px; color:var(--tf); letter-spacing:2px; text-transform:uppercase; margin-bottom:8px; }
        .pt { font-family:'Playfair Display',serif; font-size:42px; font-weight:700; margin-bottom:32px; }
        .bp { background:var(--t); color:#fff; border:none; padding:10px 20px; border-radius:var(--r); cursor:pointer; font-size:13px; font-weight:500; display:inline-flex; align-items:center; gap:8px; }
        
        /* RESEARCH & PDF VIEWER */
        .research-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; margin-top: 20px; }
        .res-card { border: 1px solid var(--b); padding: 15px; border-radius: var(--r); cursor: pointer; transition: 0.2s; }
        .res-card:hover { border-color: var(--t); background: var(--s1); }
        
        #pdf-viewer-container { display: none; margin-top: 20px; border: 1px solid var(--b); position: relative; background: #525659; overflow: auto; height: 80vh; }
        #pdf-canvas-wrapper { position: relative; margin: 20px auto; box-shadow: 0 5px 15px rgba(0,0,0,0.3); width: fit-content; }
        #hl-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: auto; z-index: 10; }
        .hl-rect { position: absolute; background: rgba(255, 235, 59, 0.4); mix-blend-mode: multiply; pointer-events: none; }

        /* CALCULATOR SCALING */
        .calc-container { max-width: 350px; border: 1px solid var(--b); border-radius: 8px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .c-display { background: var(--t); color: #fff; padding: 30px 20px; text-align: right; }
        .c-res { font-family: 'JetBrains Mono'; font-size: 32px; }
        .c-grid { display: grid; grid-template-columns: repeat(4, 1fr); }
        .c-btn { border: 0.5px solid #333; padding: 20px; background: #1a1a1a; color: #ccc; cursor: pointer; font-family: 'JetBrains Mono'; }
        .c-btn:hover { background: #333; }
        .c-btn.op { background: #252525; color: #fff; }

    </style>
</head>
<body>

<nav class="sidebar">
    <div class="logo">P.</div>
    <button class="nb on" data-page="about" onclick="nav('about')"><i class="fa-solid fa-house"></i></button>
    <button class="nb" data-page="portfolio" onclick="nav('portfolio')"><i class="fa-solid fa-briefcase"></i></button>
    <button class="nb" data-page="calc" onclick="nav('calc')"><i class="fa-solid fa-calculator"></i></button>
    <button class="nb" data-page="research" onclick="nav('research')"><i class="fa-solid fa-book"></i></button>
</nav>

<div class="main">
    <div class="page on" id="page-about">
        <div class="ey">Curriculum Vitae</div>
        <h1 class="pt">Creative Developer <br>& Researcher</h1>
        <p style="max-width: 500px; line-height: 1.6; color: var(--td); margin-bottom: 30px;">
            Merging technical precision with aesthetic clarity. This dashboard serves as a workspace for projects, 
            mathematical modeling, and academic document analysis.
        </p>
        <button class="bp" onclick="nav('portfolio')">View Case Studies <i class="fa-solid fa-arrow-right"></i></button>
    </div>

    <div class="page" id="page-calc">
        <div class="ey">Utilities / 01</div>
        <h1 class="pt">Calculator</h1>
        <div class="calc-container">
            <div class="c-display">
                <div class="c-res" id="calc-screen">0</div>
            </div>
            <div class="c-grid">
                <button class="c-btn op" onclick="cClear()">AC</button>
                <button class="c-btn op" onclick="cInp('(')">(</button>
                <button class="c-btn op" onclick="cInp(')')">)</button>
                <button class="c-btn op" onclick="cInp('/')">÷</button>
                <button class="c-btn" onclick="cInp('7')">7</button>
                <button class="c-btn" onclick="cInp('8')">8</button>
                <button class="c-btn" onclick="cInp('9')">9</button>
                <button class="c-btn op" onclick="cInp('*')">×</button>
                <button class="c-btn" onclick="cInp('4')">4</button>
                <button class="c-btn" onclick="cInp('5')">5</button>
                <button class="c-btn" onclick="cInp('6')">6</button>
                <button class="c-btn op" onclick="cInp('-')">-</button>
                <button class="c-btn" onclick="cInp('1')">1</button>
                <button class="c-btn" onclick="cInp('2')">2</button>
                <button class="c-btn" onclick="cInp('3')">3</button>
                <button class="c-btn op" onclick="cInp('+')">+</button>
                <button class="c-btn" style="grid-column: span 2;" onclick="cInp('0')">0</button>
                <button class="c-btn" onclick="cInp('.')">.</button>
                <button class="c-btn op" style="background: #fff; color: #000;" onclick="cEval()">=</button>
            </div>
        </div>
    </div>

    <div class="page" id="page-research">
        <div class="ey">Academic / 02</div>
        <h1 class="pt">Research Lab</h1>
        
        <div style="margin-bottom: 20px;">
            <label class="bp" for="pdf-upload">
                <i class="fa-solid fa-upload"></i> Upload PDF for Analysis
            </label>
            <input type="file" id="pdf-upload" hidden accept="application/pdf" onchange="handlePDF(event)">
            <button class="bp" style="background:none; color:var(--t); border:1px solid var(--b)" onclick="closePDF()">Close Viewer</button>
        </div>

        <div id="pdf-viewer-container">
            <div id="pdf-canvas-wrapper">
                <canvas id="pdf-render"></canvas>
                <div id="hl-layer"></div>
            </div>
        </div>

        <div class="research-grid" id="res-list">
            </div>
    </div>
</div>

<script>
    // NAVIGATION
    function nav(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('on'));
        document.querySelectorAll('.nb').forEach(b => b.classList.remove('on'));
        document.getElementById('page-' + pageId).classList.add('on');
        document.querySelector(`[data-page="${pageId}"]`).classList.add('on');
    }

    // CALCULATOR LOGIC
    let cExp = "";
    function cInp(v) { cExp += v; document.getElementById('calc-screen').innerText = cExp; }
    function cClear() { cExp = ""; document.getElementById('calc-screen').innerText = "0"; }
    function cEval() {
        try { 
            cExp = eval(cExp).toString(); 
            document.getElementById('calc-screen').innerText = cExp;
        } catch(e) { 
            document.getElementById('calc-screen').innerText = "Error"; 
            cExp = ""; 
        }
    }

    // RESEARCH & PDF LOGIC
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    let currentPdf = null;

    async function handlePDF(e) {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = async function() {
            const data = new Uint8Array(this.result);
            const pdf = await pdfjsLib.getDocument(data).promise;
            currentPdf = pdf;
            
            document.getElementById('pdf-viewer-container').style.display = 'block';
            renderPage(1);
        };
        reader.readAsArrayBuffer(file);
    }

    async function renderPage(num) {
        const page = await currentPdf.getPage(num);
        const viewport = page.getViewport({ scale: 1.5 });
        const canvas = document.getElementById('pdf-render');
        const ctx = canvas.getContext('2d');

        canvas.height = viewport.height;
        canvas.width = viewport.width;

        await page.render({ canvasContext: ctx, viewport: viewport }).promise;
        setupHighlighting(viewport);
    }

    function setupHighlighting(viewport) {
        const layer = document.getElementById('hl-layer');
        layer.onmouseup = function() {
            const sel = window.getSelection();
            if (sel.rangeCount > 0 && sel.toString().length > 0) {
                const range = sel.getRangeAt(0);
                const rect = range.getBoundingClientRect();
                const container = layer.getBoundingClientRect();

                const hl = document.createElement('div');
                hl.className = 'hl-rect';
                hl.style.left = (rect.left - container.left) + 'px';
                hl.style.top = (rect.top - container.top) + 'px';
                hl.style.width = rect.width + 'px';
                hl.style.height = rect.height + 'px';
                
                layer.appendChild(hl);
            }
        };
    }

    function closePDF() {
        document.getElementById('pdf-viewer-container').style.display = 'none';
    }
</script>

</body>
</html>
