<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Research OS</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<style>
body{
    margin:0;
    font-family:Inter,sans-serif;
    display:flex;
    height:100vh;
}
.sidebar{
    width:220px;
    border-right:1px solid #e0e0e0;
    padding:20px;
}
.main{
    flex:1;
    display:flex;
}
.viewer{
    flex:2;
    border-right:1px solid #e0e0e0;
    overflow:auto;
    position:relative;
}
.research{
    flex:1;
    padding:20px;
    overflow:auto;
}
canvas{
    display:block;
    margin:20px auto;
}
.hl-layer{
    position:absolute;
    inset:0;
}
.hl{
    position:absolute;
    background:rgba(255,235,59,0.4);
}
button{
    padding:6px 10px;
    margin-top:5px;
}
input{
    width:100%;
    padding:6px;
    margin-top:5px;
}
.folder{
    cursor:pointer;
    padding:5px;
    border:1px solid #ccc;
    margin-top:5px;
}
.folder.active{
    background:black;
    color:white;
}
.snippet{
    border:1px solid #ccc;
    padding:8px;
    margin-bottom:8px;
}
</style>
</head>

<body>

<div class="sidebar">
<h3>Folders</h3>
<input id="folderName" placeholder="New Folder">
<button onclick="createFolder()">Create</button>
<div id="folderList"></div>

<hr>

<h3>Load PDF</h3>
<input type="file" accept="application/pdf" onchange="loadDevicePDF(event)">
<input id="pdfURL" placeholder="Paste PDF URL">
<button onclick="loadURLPDF()">Load URL</button>
</div>

<div class="main">

<div class="viewer" id="viewer">
<div id="canvasWrapper" style="position:relative;">
<canvas id="pdfCanvas"></canvas>
<div class="hl-layer" id="hlLayer"></div>
</div>
</div>

<div class="research">
<h3>Research Notes</h3>
<div id="notes"></div>
</div>

</div>

<script>

pdfjsLib.GlobalWorkerOptions.workerSrc =
'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

let db;
let activeFolder = null;
let activeDoc = null;
let pdfInstance = null;

const request = indexedDB.open("ResearchOS",1);

request.onupgradeneeded = e=>{
    db = e.target.result;
    db.createObjectStore("folders",{keyPath:"id",autoIncrement:true});
    db.createObjectStore("documents",{keyPath:"id",autoIncrement:true});
    db.createObjectStore("highlights",{keyPath:"id",autoIncrement:true});
};

request.onsuccess = e=>{
    db = e.target.result;
    loadFolders();
};

function createFolder(){
    const name = document.getElementById("folderName").value;
    if(!name) return;
    const tx=db.transaction("folders","readwrite");
    tx.objectStore("folders").add({name});
    tx.oncomplete=loadFolders;
}

function loadFolders(){
    const tx=db.transaction("folders","readonly");
    const store=tx.objectStore("folders");
    store.getAll().onsuccess=e=>{
        const data=e.target.result;
        const list=document.getElementById("folderList");
        list.innerHTML=data.map(f=>`
            <div class="folder ${activeFolder==f.id?'active':''}" onclick="selectFolder(${f.id})">${f.name}</div>
        `).join('');
    };
}

function selectFolder(id){
    activeFolder=id;
    loadFolders();
    loadNotes();
}

function loadDevicePDF(e){
    const file=e.target.files[0];
    if(!file) return;

    const reader=new FileReader();
    reader.onload=async function(){
        const typed=new Uint8Array(this.result);
        pdfInstance=await pdfjsLib.getDocument(typed).promise;
        renderPage(1);
        saveDocument(file.name,"device");
    };
    reader.readAsArrayBuffer(file);
}

async function loadURLPDF(){
    const url=document.getElementById("pdfURL").value;
    if(!url) return;

    pdfInstance=await pdfjsLib.getDocument(url).promise;
    renderPage(1);
    saveDocument(url,"url");
}

function saveDocument(source,type){
    if(!activeFolder){
        alert("Select a folder first");
        return;
    }
    const tx=db.transaction("documents","readwrite");
    tx.objectStore("documents").add({
        folderId:activeFolder,
        source,
        type,
        date:new Date().toISOString()
    });
    activeDoc=source;
}

async function renderPage(num){
    const page=await pdfInstance.getPage(num);
    const viewport=page.getViewport({scale:1.5});
    const canvas=document.getElementById("pdfCanvas");
    const ctx=canvas.getContext("2d");

    canvas.width=viewport.width;
    canvas.height=viewport.height;

    await page.render({canvasContext:ctx,viewport}).promise;
    initHighlighter();
}

function initHighlighter(){
    const layer=document.getElementById("hlLayer");
    layer.innerHTML="";
    layer.onmouseup=function(){
        const sel=window.getSelection();
        const text=sel.toString().trim();
        if(text.length>0){
            const range=sel.getRangeAt(0);
            const rect=range.getBoundingClientRect();
            const container=layer.getBoundingClientRect();

            const hl=document.createElement("div");
            hl.className="hl";
            hl.style.left=(rect.left-container.left)+"px";
            hl.style.top=(rect.top-container.top)+"px";
            hl.style.width=rect.width+"px";
            hl.style.height=rect.height+"px";
            layer.appendChild(hl);

            saveHighlight(text);
        }
    };
}

function saveHighlight(text){
    if(!activeFolder) return;

    const tx=db.transaction("highlights","readwrite");
    tx.objectStore("highlights").add({
        folderId:activeFolder,
        document:activeDoc,
        content:text,
        date:new Date().toISOString()
    });
    tx.oncomplete=loadNotes;
}

function loadNotes(){
    if(!activeFolder) return;

    const tx=db.transaction("highlights","readonly");
    tx.objectStore("highlights").getAll().onsuccess=e=>{
        const all=e.target.result;
        const filtered=all.filter(h=>h.folderId===activeFolder);

        document.getElementById("notes").innerHTML=
            filtered.map(h=>`
                <div class="snippet">
                    <div>${h.content}</div>
                    <small>${new Date(h.date).toLocaleString()}</small>
                </div>
            `).join('');
    };
}

</script>

</body>
</html>
